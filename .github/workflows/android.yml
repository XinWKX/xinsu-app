name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 获取仓库代码
        uses: actions/checkout@v4

      - name: 安装 unzip
        run: sudo apt-get install unzip -y

      - name: 解压项目
        run: unzip xinsu_optimized_project.zip.zip -d project

      - name: 进入项目目录
        run: ls project

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装 Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: 安装依赖
        run: |
          cd project
          npm install || true

      - name: 安装 Capacitor
        run: |
          cd project
          npm install @capacitor/core
          npm install @capacitor/cli
          npm install @capacitor/android

      - name: 同步安卓工程
        run: |
          cd project
          npx cap sync android || true

      - name: 编译 APK
        run: |
          cd project/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: xinsu-apk
          path: project/android/app/build/outputs/apk/debug/app-debug.apk
